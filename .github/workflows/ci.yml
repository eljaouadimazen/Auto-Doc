name: CI — Test, Scan, Version & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: mazeneljaouadi/safe-file-generator
  FRONTEND_IMAGE: mazeneljaouadi/safe-file-generator-frontend
  REGISTRY: docker.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: ESLint backend
        run: npx eslint src/
      - name: ESLint frontend
        run: |
          cd client
          npm ci --legacy-peer-deps
          npm run lint

  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: p/default

  unit-test:
    name: Unit tests
    needs: [sca]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm test

  coverage:
    name: Coverage
    needs: [unit-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run test:coverage

  sca:
    name: Dependency scan
    needs: [lint, secrets, sast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: '1'
          severity: HIGH,CRITICAL
          trivyignores: CVE-2026-33671

  build:
    name: Build images
    needs: [coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Safe File Generator (Backend)
            org.opencontainers.image.description=Backend service for safe-file-generator
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/Dockerfile.backend
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - uses: docker/metadata-action@v5
        id: meta-frontend
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Safe File Generator (Frontend)
            org.opencontainers.image.description=Frontend service for safe-file-generator
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/Dockerfile.frontend
          load: true
          push: false
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Save backend image
        run: docker save ${{ env.BACKEND_IMAGE }}:sha-${{ steps.vars.outputs.sha_short }} > /tmp/backend.tar

      - name: Save frontend image
        run: docker save ${{ env.FRONTEND_IMAGE }}:sha-${{ steps.vars.outputs.sha_short }} > /tmp/frontend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend.tar

  scan:
    name: Scan images
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp/

      - uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp/

      - name: Load backend image
        run: docker load < /tmp/backend.tar

      - name: Load frontend image
        run: docker load < /tmp/frontend.tar

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:sha-${{ steps.vars.outputs.sha_short }}
          exit-code: '1'
          severity: HIGH,CRITICAL
          trivyignores: CVE-2026-33671

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:sha-${{ steps.vars.outputs.sha_short }}
          exit-code: '1'
          severity: HIGH,CRITICAL
          trivyignores: CVE-2026-33671

  push:
    name: Push & release
    needs: [scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp/

      - uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp/

      - name: Load backend image
        run: docker load < /tmp/backend.tar

      - name: Load frontend image
        run: docker load < /tmp/frontend.tar

      - name: Push images with SHA + latest tags
        run: |
          docker push ${{ env.BACKEND_IMAGE }} --all-tags
          docker push ${{ env.FRONTEND_IMAGE }} --all-tags

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Tag and push with semantic version tags
        if: steps.semantic.outcome == 'success'
        run: |
          git fetch origin --tags
          TAG=$(git tag -l --sort=-version:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "No tags found, skipping semver tagging"
            exit 0
          fi
          VERSION=${TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          SHA_TAG="sha-${{ steps.vars.outputs.sha_short }}"

          for IMAGE in "${{ env.BACKEND_IMAGE }}" "${{ env.FRONTEND_IMAGE }}"; do
            docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:${TAG}"
            docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:${MINOR}"
            docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:${MAJOR}"
          done

          docker push --all-tags "${{ env.BACKEND_IMAGE }}"
          docker push --all-tags "${{ env.FRONTEND_IMAGE }}"

      - name: Trigger Render deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  summary:
    name: CI summary
    needs: [lint, secrets, sast, sca, unit-test, coverage, build, scan, push]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets scan | ${{ needs.secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency scan | ${{ needs.sca.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit tests | ${{ needs.unit-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build images | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan images | ${{ needs.scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Push & release | ${{ needs.push.result }} |" >> $GITHUB_STEP_SUMMARY
