name: CI — Test, Scan & Push Docker Images

on:
  push:
    branches: [main, master, dev]
  workflow_dispatch:

env:
  BACKEND_IMAGE: mazeneljaouadi/safe-file-generator
  FRONTEND_IMAGE: mazeneljaouadi/safe-file-generator-frontend

jobs:
  # ── BEFORE DOCKER ──────────────────────────────────────────────────────────
  test:
    name: Run tests & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run test:coverage

  lint:
    name: Static code analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: ESLint backend
        run: npx eslint src/
      - name: ESLint frontend
        run: |
          cd client
          npm ci --legacy-peer-deps
          npm run lint

  # ── DOCKER: BUILD → SCAN → PUSH ───────────────────────────────────────────
  backend:
    name: Build, scan & push backend
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/Dockerfile.backend
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.tags-json)[0] }}
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          format: 'table'
      - name: Push to Docker Hub
        run: docker push --all-tags ${{ env.BACKEND_IMAGE }}

  frontend:
    name: Build, scan & push frontend
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/Dockerfile.frontend
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.tags-json)[0] }}
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          format: 'table'
      - name: Push to Docker Hub
        run: docker push --all-tags ${{ env.FRONTEND_IMAGE }}

  # ── SUMMARY ────────────────────────────────────────────────────────────────
  summary:
    name: CI summary
    needs: [backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build & Push | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build & Push | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
